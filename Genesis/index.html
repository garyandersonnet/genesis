      z-index: 0;
    }

    /* ── Hero ── */

      position: relative;
      z-index: 1;
      text-align: center;
      padding: 80px 24px 60px;

      font-size: 2.4rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      color: var(--gold);
      text-shadow: 0 0 60px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .hero h1 span {
      display: block;
      font-size: 0.38em;
      font-family: 'Crimson Pro', serif;
      font-weight: 300;
      font-style: italic;
      color: var(--gold-light);
      letter-spacing: 0.25em;
      margin-top: 12px;
      opacity: 0.85;
    }

    .hero-verse {
      max-width: 520px;
      margin: 32px auto 0;
      font-size: 1.15rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 40px auto 0;
      max-width: 320px;
    }
    .hero-divider::before,
    .hero-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
    .hero-divider-gem {
      color: var(--gold);
      font-size: 1rem;
    }

    /* ── Nav chapters bar ── */
    .chapter-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,11,8,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .chapter-nav::-webkit-scrollbar { display: none; }

    .chapter-nav-inner {
      display: inline-flex;
      gap: 4px;
      padding: 10px 20px;
    }

    .chapter-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .chapter-nav a:hover {
      color: var(--gold);
      background: rgba(201,168,76,0.08);
    }
    .chapter-nav .lyrics-link {
      color: var(--gold);
      opacity: 0.7;
      border: 1px solid rgba(201,168,76,0.25);
      margin-right: 8px;
    }
    .chapter-nav .lyrics-link:hover { opacity: 1; }

    /* ── Main content ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* ── Chapter section ── */
    .chapter {
      margin-bottom: 80px;
      scroll-margin-top: 56px;
    }

    .chapter-header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 28px;
    }

    .chapter-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3.5rem;
      color: var(--gold);
      opacity: 0.25;
      line-height: 1;
      min-width: 64px;
    }

    .chapter-info h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    .chapter-info p {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
    }

    .chapter-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
      margin-bottom: 28px;
    }

    /* ── Media grid ── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .media-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .media-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.08);
    }

    /* Placeholder when no media yet */
    .media-placeholder {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, rgba(100,60,10,0.1) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .media-placeholder svg { opacity: 0.3; }
    .media-placeholder span {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Actual embed */
    .media-embed {
      aspect-ratio: 16/9;
      width: 100%;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .media-embed iframe,
    .media-embed video,
    .media-embed audio {
      width: 100%;
      height: 100%;
      border: none;
    }

    .media-card-body {
      padding: 16px 18px 18px;
    }

    .media-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .media-card-body h3 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.9rem;
      color: var(--cream);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .media-card-body p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
    }

    /* ── Empty chapter note ── */
    .coming-soon {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      border: 1px dashed rgba(201,168,76,0.2);
      border-radius: 12px;
      color: var(--muted);
      font-style: italic;
      font-size: 0.95rem;
    }
    .coming-soon strong {
      display: block;
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.8rem;
      color: var(--gold);
      opacity: 0.5;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      font-style: normal;
    }

    /* ── Add media CTA (owner-facing) ── */
    .add-media-hint {
      display: none; /* shown via ?edit=1 or owner JS if desired */
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid rgba(201,168,76,0.1);
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer span { color: var(--gold); opacity: 0.6; }

    /* ── Scrollbar ── */

    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero { animation: fadeUp 1s ease both; }
    .chapter { animation: fadeUp 0.6s ease both; }
  </style>
</head>

// ─── Render chapters ───

  section.className = 'chapter';
  section.id = `ch${ch.num}`;

  const hasMedia = ch.media && ch.media.length > 0;

  let mediaHTML = '';
  if (hasMedia) {
    ch.media.forEach(m => {
      let embedHTML = '';
      if (m.type === 'youtube') {
        embedHTML = `<div class="media-embed">
          <iframe src="https://www.youtube.com/embed/${m.youtubeId}?rel=0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen loading="lazy"></iframe>
        </div>`;
      } else if (m.type === 'video') {
        embedHTML = `<div class="media-embed">
          <video controls preload="metadata"><source src="${m.src}"></video>
        </div>`;
      } else if (m.type === 'song') {
        embedHTML = `<div class="media-embed" style="aspect-ratio:auto;background:rgba(0,0,0,0.4);display:flex;align-items:center;padding:20px 24px;">
          <audio controls style="width:100%;height:40px;"><source src="${m.src}"></audio>
        </div>`;
      } else if (m.type === 'soundcloud') {
        embedHTML = `<div class="media-embed">
          <iframe scrolling="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=${encodeURIComponent(m.src)}&color=%23c9a84c&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
          </iframe>
        </div>`;
      }

      const icon = (m.type === 'youtube' || m.type === 'video') ? '▶' : '♫';
      const label = (m.type === 'youtube' || m.type === 'video') ? 'Video' : 'Song';

      mediaHTML += `<article class="media-card">
        ${embedHTML}
        <div class="media-card-body">
          <div class="media-type-badge">${icon} ${label}</div>
          <h3>${m.title}</h3>
          <p>${m.description || ''}</p>
        </div>
      </article>`;
    });
  } else {
    mediaHTML = `<div class="coming-soon">
      <strong>Coming Soon</strong>
      AI songs &amp; videos for this chapter are in the works.
    </div>`;
  }

  section.innerHTML = `
    <div class="chapter-header">
      <div class="chapter-number">${String(ch.num).padStart(2,'0')}</div>
      <div class="chapter-info">
        <h2>${ch.title}</h2>
        <p>${ch.summary}</p>
      </div>
    </div>
    <div class="chapter-divider"></div>
    <div class="media-grid">${mediaHTML}</div>
  `;

  main.appendChild(section);
});

// ─── Highlight active chapter nav item ───
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.chapter-nav a').forEach(a => a.style.color = '');
      const id = e.target.id;
      const active = document.querySelector(`.chapter-nav a[href="#${id}"]`);
      if (active) active.style.color = 'var(--gold)';
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.chapter').forEach(el => observer.observe(el));
</script>
</body>
</html>
