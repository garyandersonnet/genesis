  <style>

      min-height: 100vh;
      overflow-x: hidden;
    }

      z-index: 0;

      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 24px 40px;
    }
    header a.back {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      margin-bottom: 24px;

      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201,168,76,0.3);
    }
    header h1 span {
      display: block;
      font-size: 0.38em;
      font-family: 'Crimson Pro', serif;
      font-weight: 300;
      font-style: italic;
      color: var(--gold-light);
      letter-spacing: 0.25em;
      margin-top: 10px;
      opacity: 0.8;
    }
    .header-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px auto 0;
      opacity: 0.4;
    }

    /* ── Nav ── */
    .chapter-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,11,8,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .chapter-nav::-webkit-scrollbar { display: none; }
    .chapter-nav-inner {
      display: inline-flex;
      gap: 4px;
      padding: 10px 20px;
    }
    .chapter-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 4px;

    }

    main {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* ── Chapter block ── */
    .chapter {
      margin-bottom: 72px;
      scroll-margin-top: 56px;
    }
    .chapter-heading {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin-bottom: 6px;
    }
    .ch-num {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.8rem;
      color: var(--gold);
      opacity: 0.2;
      line-height: 1;
      min-width: 52px;
    }
    .ch-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.15rem;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }
    .ch-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.35), transparent);
      margin: 12px 0 22px;

    .lyrics {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--cream);
    }
    .lyrics .verse {
      margin-bottom: 20px;
    }
    .lyrics .chorus {
      margin: 20px 0;
      padding-left: 22px;
      border-left: 2px solid rgba(201,168,76,0.35);
      color: var(--gold-light);
      font-style: italic;
    }
    .lyrics .label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      font-style: normal;

      position: relative;
      z-index: 1;
      text-align: center;
      padding: 36px 24px;
      border-top: 1px solid rgba(201,168,76,0.1);
      color: var(--muted);

    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
  </style>

// ── Render nav
const nav = document.getElementById('chapNav');
chapters.forEach(ch => {
  const a = document.createElement('a');
  a.href = `#ch${ch.num}`;
  a.textContent = ch.num;
  a.title = ch.title;
  nav.appendChild(a);
});

// ── Render chapters
const main = document.getElementById('main');
chapters.forEach(ch => {
  const section = document.createElement('section');
  section.className = 'chapter';
  section.id = `ch${ch.num}`;
  section.innerHTML = `
    <div class="chapter-heading">
      <div class="ch-num">${String(ch.num).padStart(2,'0')}</div>
      <div class="ch-title">${ch.title}</div>
    </div>
    <div class="ch-divider"></div>
    <div class="lyrics">${ch.lyrics}</div>
  `;
  main.appendChild(section);
});

// ── Active nav highlight
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.chapter-nav a').forEach(a => a.style.color = '');
      const active = document.querySelector(`.chapter-nav a[href="#${e.target.id}"]`);
      if (active) active.style.color = 'var(--gold)';
    }
  });
}, { threshold: 0.2 });
document.querySelectorAll('.chapter').forEach(el => observer.observe(el));
</script>
